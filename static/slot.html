<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Веселые игры</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/slot.css') }}">
    <link rel="stylesheet" href="/static/styles/slot.css">
</head>
<body>
    <div class="stage-bg stage-bg-slot"></div>

    <main class="screen-shell">
        <section class="screen-card panel-glow">
            <header class="screen-header">
                <div class="eyebrow">ADMIN MODE</div>
                <h1>Веселые игры</h1>
                <div class="subline">Свободный слот</div>
            </header>

            <section class="screen-intro panel-inner">
                <div class="intro-title">Добро пожаловать на игру</div>
                <div class="intro-text">Выберите режим запуска для текущей комнаты.</div>
            </section>

            <section class="screen-actions panel-inner">
                <div class="section-title">Режимы</div>

                <form action="/host_slot" method="post" class="select_game">
                    <input type="submit" class="action-btn action-host" value="Режим ведущего">
                </form>

                <form action="/spec_slot" method="post" class="select_game">
                    <input type="submit" class="action-btn action-spec" value="Режим зрителя">
                </form>
            </section>
        </section>
    </main>

    <footer class="copyrights">
        Здесь могло бы быть ваше имя и ваша реклама.
    </footer>
</body>
</html>
