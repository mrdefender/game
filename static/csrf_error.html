<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Сессия устарела</title>
    <style>
        body{margin:0;min-height:100vh;display:grid;place-items:center;background:#02050b;color:#edf7ff;font-family:Arial,sans-serif}
        main{max-width:520px;margin:24px;padding:32px;text-align:center;border:1px solid rgba(25,184,255,.35);border-radius:18px;background:linear-gradient(180deg,rgba(15,34,60,.96),rgba(9,24,43,.95));box-shadow:0 0 30px rgba(25,184,255,.15)}
        h1{margin-top:0;color:#80e7ff}p{color:#9bb8d8;line-height:1.5}button{padding:12px 20px;border:0;border-radius:12px;font-weight:700;cursor:pointer;background:linear-gradient(180deg,#80e7ff,#19b8ff);color:#02050b}
    </style>
</head>
<body>
<main>
    <h1>Сессия устарела</h1>
    <p>Защитный токен отсутствует или больше не действует. Обновите страницу и повторите действие.</p>
    <button type="button" onclick="location.reload()">Обновить страницу</button>
</main>
</body>
</html>
