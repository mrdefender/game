<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свободный слот — пульт игрока</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style/user_slot.css">
	<link rel="stylesheet" href="{{ url_for('static', filename='styles/user_slot.css') }}">
	
</head>
<body data-role="player">
    <div class="player-stage-bg"></div>

    <main class="player-shell">
        <section class="player-card panel-glow">
            <header class="player-header">
                <div class="eyebrow">ТВ-режим</div>
                <h1>Свободный слот — пульт игрока</h1>
                <div class="player-legend player-legend-states">
    <div class="legend-chip legend-state legend-state-player">
        <span class="legend-label">Ответ игрока</span>
        <span class="legend-value" id="ui-player-answer">—</span>
    </div>

    <div class="legend-chip legend-state legend-state-right">
        <span class="legend-label">Правильный</span>
        <span class="legend-value" id="ui-right-answer">—</span>
    </div>

    <div class="legend-chip legend-state legend-state-fatal">
        <span class="legend-label">Фаталы</span>
        <span class="legend-value legend-value-fatal" id="ui-fatal-answer">—</span>
    </div>

    <div class="legend-chip legend-state legend-state-navi">
        <span class="legend-label">Навигатор</span>
        <span class="legend-value" id="ui-player-navi-result">—</span>
    </div>
</div>
            </header>

            <div class="player-body">
                <section class="welcome-panel panel-inner">
                    <div class="welcome-copy">
                        <label class="welcome-title" id="welcome">Добро пожаловать на игру</label>
                        <label class="welcome-title" id="welcome2">Свободный слот!</label>
                        <label class="welcome-subtitle game-status wait" id="welcome3">Ожидайте дальнейших указаний!</label>
                    </div>

                    <div class="player-meta">
                        <input type="submit" class="message user-chip" id="user_name" value="{{value}}">
                        <input type="submit" class="message status-chip" id="au" value="" hidden>
                    </div>
                </section>

                <section class="question-panel panel-inner">
                    <div class="section-title">Игровой экран</div>
                    <div class="questions screen-question" id="question" value="" hidden></div>
                </section>

 
<section class="answers-panel panel-inner">
                    <div class="section-row">
                        <div class="section-title">Варианты ответа</div>
                        <div class="answers-note">Оптимизировано под смартфон</div>
                    </div>

                    <div class="answers-grid">
                        <input type="button" class="answer-btn" id="o1" value="1" onclick="a1()" disabled hidden>
                        <input type="button" class="answer-btn" id="o2" value="2" onclick="a2()" disabled hidden>
                        <input type="button" class="answer-btn" id="o3" value="3" onclick="a3()" disabled hidden>
                        <input type="button" class="answer-btn" id="o4" value="4" onclick="a4()" disabled hidden>
                        <input type="button" class="answer-btn" id="o5" value="5" onclick="a5()" disabled hidden>
                        <input type="button" class="answer-btn" id="o6" value="6" onclick="a6()" disabled hidden>
                        <input type="button" class="answer-btn" id="o7" value="7" onclick="a7()" disabled hidden>
                        <input type="button" class="answer-btn" id="o8" value="8" onclick="a8()" disabled hidden>
                        <input type="button" class="answer-btn" id="o9" value="9" onclick="a9()" disabled hidden>
                        <input type="button" class="answer-btn" id="o10" value="10" onclick="a10()" disabled hidden>
                        <input type="button" class="answer-btn" id="o11" value="11" onclick="a11()" disabled hidden>
                        <input type="button" class="answer-btn" id="o12" value="12" onclick="a12()" disabled hidden>
                        <input type="button" class="answer-btn" id="o13" value="13" onclick="a13()" disabled hidden>
                        <input type="button" class="answer-btn" id="o14" value="14" onclick="a14()" disabled hidden>
                        <input type="button" class="answer-btn" id="o15" value="15" onclick="a15()" disabled hidden>
                    </div>
                </section>

                <section class="helps-panel panel-inner">
                    <div class="section-row">
                        <div class="section-title">Подсказки</div>
                    </div>

                    <div class="helps-grid">
                        <button type="button" class="help-btn help-icon help-5050" id="p50_50" value="" onclick="p50_50()" disabled hidden> </button>
                        <button type="button" class="help-btn help-icon help-alter" id="palter" value="" onclick="palter()" disabled hidden></button>
                        <button type="button" class="help-btn help-icon help-navi" id="pnavi" value="" onclick="pnavi()" disabled hidden></button>
                        <button type="button" class="help-btn help-icon help-x2" id="px2" value="" onclick="px2()" disabled hidden></button>
                        <button type="button" class="help-btn help-icon help-auden" id="pauden" value="" onclick="pauden()" disabled hidden></button>
                        <button type="button" class="help-btn help-icon help-fact" id="pfact" value="" onclick="pfact()" disabled hidden></button>
                    </div>
                </section>

                <section class="otbor-panel panel-inner">
                    <div class="section-title">Отборочный тур</div>
                    <div class="otbor-timer-strip" id="otborTimerStrip" hidden>
  <div class="otbor-timer-head">
    <span class="otbor-timer-title" id="otbor-timer-title" hidden>Таймер ответа</span>
    <span class="otbor-timer-digits" id="otborTimerValue" >10</span>
  </div>

  <div class="otbor-timer-bar">
    <div class="otbor-timer-bar-fill" id="otborTimerBarFill"></div>
  </div>

  <div class="otbor-timer-caption" id="otborTimerStatus">Ожидание старта</div>
</div>
                    
                    <div class="otbor-grid">
                        <input class="otbor_input otbor-field" id="otbor_input" name="otbor_input" type="number" placeholder="Ответ" required hidden>
                        <input type="submit" class="send_answer_otbor otbor-submit" id="otbor_submit" onclick="send_answer_otbor()" value="Ответить" disabled hidden>
                    </div>

                    <input type="submit" id="time-start" value="" disabled hidden>
                    <input type="submit" id="count_fatal" value="" disabled hidden>
                    <input type="submit" id="ex2" value="0" disabled hidden>
                    <input type="submit" id="ans" value="0" disabled hidden>
                </section>
            </div>
        </section>
    </main>

    <footer class="copyrights">
        Здесь могло бы быть ваше имя и ваша реклама.
    </footer>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/js/user_slot.js"></script>
    <script src="/static/js/user_slot_stage_addon_light.js"></script>
    <script src="/static/js/user_slot_navi_result_addon.js"></script>
	<script src="/static/js/help_icons_show_patch.js"></script>
	<script src="/static/js/help_disabled_states.js"></script>
</body>
</html>
