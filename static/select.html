<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Веселые игры</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/select.css') }}">
</head>
<body>
    <div class="stage-bg"></div>

    <main class="screen-shell">
        <section class="screen-card panel-glow">
            <header class="screen-header">
                <div class="eyebrow">ADMIN MODE</div>
                <h1>Веселые игры</h1>
                <div class="subline">Режим администратора</div>
            </header>

            <section class="screen-intro panel-inner">
                <div class="intro-title">Добро пожаловать</div>
                <div class="intro-text">Выберите игру для запуска административного сценария.</div>
            </section>

            <section class="screen-actions panel-inner">
                <div class="section-title">Доступные игры</div>
                <form action="/slot" method="post" class="select_game">
                    <input type="submit" class="action-btn action-primary" value="Свободный слот">
                </form>
            </section>
        </section>
    </main>

    <script src="/static/js/select.js"></script>
</body>
</html>
